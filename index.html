<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froggy Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-area {
            position: relative;
            width: 90%;
            max-width: 600px;
            height: 500px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 4px solid #fff;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #90EE90, #228B22);
            opacity: 0.9;
        }

        .water {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
        }

        .frog {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #7FFF7F, #22AA22);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .frog::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            top: 18px;
            left: 15px;
        }

        .frog::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
            top: 18px;
            right: 15px;
        }

        .frog.jumping {
            animation: jump 0.6s ease-out;
        }

        @keyframes jump {
            0% {
                bottom: 80px;
                transform: translateX(-50%) scaleY(0.95);
            }
            50% {
                bottom: 280px;
                transform: translateX(-50%) scaleY(0.85);
            }
            100% {
                bottom: 80px;
                transform: translateX(-50%) scaleY(0.95);
            }
        }

        .lily-pad {
            position: absolute;
            width: 80px;
            height: 70px;
            background: radial-gradient(ellipse at 30% 30%, #90EE90, #228B22);
            border-radius: 50%;
            border: 3px solid #1a6b1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .jump-counter {
            position: absolute;
            top: 70px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="water"></div>
            <div class="ground"></div>
            <div class="score">🐸 Froggy</div>
            <div class="jump-counter">Jumps: <span id="jumpCount">0</span></div>
            <div class="frog" id="frog"></div>
            <div class="instructions">Click the frog or press SPACE to jump!</div>
        </div>
    </div>

    <script>
        const frog = document.getElementById('frog');
        const jumpCountDisplay = document.getElementById('jumpCount');
        let jumpCount = 0;
        let isJumping = false;

        function makeJump() {
            if (isJumping) return;

            isJumping = true;
            jumpCount++;
            jumpCountDisplay.textContent = jumpCount;

            frog.classList.add('jumping');

            setTimeout(() => {
                frog.classList.remove('jumping');
                isJumping = false;
            }, 600);
        }

        frog.addEventListener('click', makeJump);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                makeJump();
            }
        });

        // Add some random lily pads for decoration
        const gameArea = document.querySelector('.game-area');
        for (let i = 0; i < 3; i++) {
            const lilyPad = document.createElement('div');
            lilyPad.className = 'lily-pad';
            lilyPad.textContent = '🌸';
            lilyPad.style.top = (100 + Math.random() * 100) + 'px';
            lilyPad.style.left = (Math.random() * (100 - 20) + 10) + '%';
            gameArea.appendChild(lilyPad);
        }
    </script>
</body>
</html>
